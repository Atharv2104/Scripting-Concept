<html>
<head>
    <title>JavaScript Variables Example</title>
</head>
<body>
    <h1>JavaScript Variables Example    </h1>

    <script>
        var abc="hiiiiiii";
        var_abc="hii";
        var$abc="hello";
        console.log(abc);
        document.write("abc="+abc+"<br>");
        document.write("var_abc="+var_abc+"<br>");
        document.write("var$abc="+var$abc+"<br>");

        let age=21;
        let name="John";
        console.log(age);
        document.write("age="+age+"<br>");
        document.write("name="+name+"<br>");
        const pi=3.14;
        console.log(pi);
        document.write("pi="+pi+"<br>");
        
        

        

    </script>
</body>
</html>
